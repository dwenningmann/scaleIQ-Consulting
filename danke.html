<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anfrage erhalten – ScaleIQ Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink:#0C0C0A; --paper:#FAFAF8; --muted:#6B6B68; --rule:#E0E0DC; --lime:#C8F135; --lime-d:#8faa24; }
body { font-family:'Inter',sans-serif; background:var(--ink); color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 20px; }
.logo { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:22px; color:#fff; margin-bottom:48px; }
.logo b { color:var(--lime); }
.logo span { font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); display:block; margin-top:2px; }
.check { width:64px; height:64px; border-radius:50%; background:var(--lime); display:flex; align-items:center; justify-content:center; margin:0 auto 28px; font-size:28px; }
h1 { font-family:'Space Grotesk',sans-serif; font-size:clamp(28px,5vw,44px); font-weight:700; letter-spacing:-.03em; color:#fff; margin-bottom:16px; line-height:1.1; }
h1 span { color:var(--lime); }
p { font-size:16px; color:rgba(255,255,255,.5); line-height:1.75; max-width:420px; margin:0 auto 40px; }
a { height:48px; padding:0 32px; background:var(--lime); color:var(--ink); font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700; letter-spacing:.04em; text-decoration:none; display:inline-flex; align-items:center; gap:8px; transition:opacity .15s; }
a:hover { opacity:.85; }
.footer { margin-top:48px; font-size:11px; color:rgba(255,255,255,.2); }
</style>
</head>
<body>
  <div class="logo">Scale<b>IQ</b><span>CONSULTING</span></div>
  <div class="check">✓</div>
  <h1>Anfrage erhalten.<br><span>Ihr Lead kommt in 24h.</span></h1>
  <p>Wir haben Ihre Anfrage erhalten und bereiten Ihren persönlichen Test-Lead vor. Sie erhalten ihn innerhalb von 24 Stunden per E-Mail.</p>
  <a href="/">← Zurück zur Startseite</a>
  <div class="footer">© 2026 ScaleIQ Consulting · connect@scaleiq-consulting.de</div>
</body>
</html>
